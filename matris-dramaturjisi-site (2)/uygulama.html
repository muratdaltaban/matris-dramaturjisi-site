<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uygulama — Matris Dramaturjisi</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background: var(--bg); overflow-x: hidden; }
  .app-page {
    padding: 88px 16px 24px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .app-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .app-bar-title {
    font-family: var(--serif);
    font-size: 22px;
    font-style: italic;
    color: var(--text-2);
    margin: 0;
  }
  .app-bar-title strong {
    font-style: normal;
    color: var(--black);
    font-weight: 600;
  }
  .app-bar-hints {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-3);
    text-transform: uppercase;
  }
  .app-frame {
    width: 100%;
    height: calc(100vh - 140px);
    min-height: 700px;
    border: 1px solid var(--border);
    background: #08080e;
    display: block;
  }
  @media (max-width: 720px) {
    .app-page { padding: 80px 8px 16px; }
    .app-bar-title { font-size: 16px; }
    .app-bar-hints { display: none; }
    .app-frame { height: calc(100vh - 120px); min-height: 500px; }
  }
</style>
</head>
<body>

<div class="app-page">

  <div class="app-bar">
    <h1 class="app-bar-title"><strong>Matris Dramaturjisi</strong> — uygulama</h1>
    <div class="app-bar-hints">tek dosya · tarayıcıda çalışır · veriler yerel</div>
  </div>

  <iframe class="app-frame" src="uygulama-iframe.html" title="Matris Dramaturjisi uygulaması"></iframe>

</div>

<script src="site.js"></script>
</body>
</html>
